name: CI with Maven and Checkstyle

on:
  push:
    branches: [ "main", "development" ]
  pull_request:
    branches: [ "main", "development" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: List files (Debug)
        run: ls -R
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Checkstyle
        run: mvn -f Project-/pom.xml checkstyle:check

      - name: Generate JavaDoc
        run: mvn -f Project-/pom.xml javadoc:javadoc

      - name: Create .nojekyll
        run: touch Project-/target/site/apidocs/.nojekyll

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: Project-/target/site/apidocs
          branch: gh-pages